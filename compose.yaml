services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_PASSWORD: alphone
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 15

volumes:
  postgres-data:
